<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACH PRO TERMINAL v2</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<header>

<div class="logo">
🚀 ACH PRO TERMINAL
</div>

<div class="status">

<span class="dot"></span>

LIVE MARKET

</div>

</header>

<div class="main-container">

<!-- LEFT PANEL -->

<div class="left-panel">

<div class="card">

<h2>Select Index</h2>

<select id="index">

<option>NIFTY</option>

<option>BANKNIFTY</option>

<option>FINNIFTY</option>

<option>MIDCPNIFTY</option>

<option>SENSEX</option>

<option>BANKEX</option>

</select>

</div>

<div class="card">

<h2>Spot</h2>

<h1 id="spotPrice">

Loading...

</h1>

</div>

<div class="card">

<h2>ATM Strike</h2>

<h1 id="atmStrike">

--

</h1>

</div>

<div class="card">

<h2>AI Recommendation</h2>

<h1 class="buy">

BUY CE

</h1>

<p>

Confidence

<span id="confidence">

91%

</span>

</p>

<p>

Trend

<span id="trend">

Bullish

</span>

</p>

</div>

</div>

<!-- CENTER -->

<div class="center-panel">

<div class="chart-card">

<h2>Live Chart</h2>

<div id="tvchart"></div>

</div>
