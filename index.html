<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACH PRO TERMINAL v2</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<header>

<div class="logo">
🚀 ACH PRO TERMINAL
</div>

<div class="tagline">
AI Powered Options Trading Terminal
</div>

</header>

<div class="dashboard">

<!-- LEFT PANEL -->

<div class="left-panel">

<div class="card">

<h2>Select Index</h2>

<select id="index">

<option>NIFTY</option>

<option>BANKNIFTY</option>

<option>FINNIFTY</option>

<option>MIDCPNIFTY</option>

<option>SENSEX</option>

</select>

</div>

<div class="card">

<h2>Spot Price</h2>

<h1 id="spotPrice">
Loading...
</h1>

</div>

<div class="card">

<h2>ATM Strike</h2>

<h1 id="atmStrike">
--
</h1>

</div>

</div>

<!-- CENTER PANEL -->

<div class="center-panel">

<div class="card">

<h2>Live Chart</h2>

<div id="tvchart"></div>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="right-panel">

<div class="card">

<h2>AI Analysis</h2>

<p>Trend :
<span id="trend">
Waiting...
</span></p>

<p>Breakout :
<span id="breakout">
--
</span></p>

<p>Stop Loss :
<span id="sl">
--
</span></p>

<p>Target 1 :
<span id="t1">
--
</span></p>

<p>Target 2 :
<span id="t2">
--
</span></p>

<p>Target 3 :
<span id="t3">
--
</span></p>

<p>

Confidence

</p>

<div class="meter">

<div class="meter-fill"
id="confidenceBar">

</div>

</div>

<h3 id="confidenceText">

0%

</h3>

</div>

</div>

</div>
